name: network_engineering_assistant
description: >
  A cross-platform educational app for network design and administration.
  Calculates subnetting, VLSM, VLANs, generates Cisco-style configurations,
  and provides step-by-step learning explanations.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.1

  # Navigation
  go_router: ^12.1.3

  # Local storage
  shared_preferences: ^2.2.2

  # URL / Links externos
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
